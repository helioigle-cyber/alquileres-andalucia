<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 150">
  <rect width="400" height="150" rx="12" fill="#ffffff"/>

  <!-- Columna izquierda -->
  <g fill="#2d6a4f">
    <rect x="10" y="14" width="28" height="7" rx="1"/>
    <rect x="17" y="21" width="14" height="78"/>
    <rect x="10" y="99" width="28" height="7" rx="1"/>
  </g>
  <g stroke="#ffffff" stroke-width="1">
    <line x1="21" y1="21" x2="21" y2="99"/>
    <line x1="24" y1="21" x2="24" y2="99"/>
    <line x1="27" y1="21" x2="27" y2="99"/>
  </g>

  <!-- Columna derecha -->
  <g fill="#2d6a4f">
    <rect x="362" y="14" width="28" height="7" rx="1"/>
    <rect x="369" y="21" width="14" height="78"/>
    <rect x="362" y="99" width="28" height="7" rx="1"/>
  </g>
  <g stroke="#ffffff" stroke-width="1">
    <line x1="373" y1="21" x2="373" y2="99"/>
    <line x1="376" y1="21" x2="376" y2="99"/>
    <line x1="379" y1="21" x2="379" y2="99"/>
  </g>

  <!-- Texto central -->
  <text x="200" y="63" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="20" letter-spacing="1" fill="#2d6a4f">GRUPO NACIONALISTA ANDALUZ</text>
  <text x="200" y="100" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-style="italic" font-weight="400" font-size="15" fill="#2d6a4f">Andalucía Primero. Siempre.</text>
</svg>
